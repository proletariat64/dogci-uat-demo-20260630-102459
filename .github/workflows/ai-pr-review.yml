name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string
      ai_review_engine:
        description: AI review engine
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  ai-pr-review:
    name: AI PR Review
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}

    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
      AI_REVIEW_ENGINE: ${{ github.event_name == 'workflow_dispatch' && inputs.ai_review_engine || vars.AI_REVIEW_ENGINE || 'claude-deepseek' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_AUTH_TOKEN }}
      QODER_PERSONAL_ACCESS_TOKEN: ${{ secrets.QODER_PERSONAL_ACCESS_TOKEN }}
      QODERCLI_VERSION: "1.0.34"
      QODERCLI_CACHE_DIR: .github/.cache/qodercli

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show AI review engine
        shell: bash
        run: |
          set -euo pipefail
          echo "Selected AI review engine: ${AI_REVIEW_ENGINE}"

      - name: Restore qodercli cache
        if: ${{ env.AI_REVIEW_ENGINE == 'qoder' }}
        id: qodercli-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.QODERCLI_CACHE_DIR }}
          key: qodercli-${{ runner.os }}-${{ runner.arch }}-${{ env.QODERCLI_VERSION }}

      - name: Install qodercli
        if: ${{ env.AI_REVIEW_ENGINE == 'qoder' && steps.qodercli-cache-restore.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$QODERCLI_CACHE_DIR"
          npm install -g "@qoder-ai/qodercli@${QODERCLI_VERSION}" --prefix "$GITHUB_WORKSPACE/$QODERCLI_CACHE_DIR"

      - name: Save qodercli cache
        if: ${{ env.AI_REVIEW_ENGINE == 'qoder' && steps.qodercli-cache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.QODERCLI_CACHE_DIR }}
          key: ${{ steps.qodercli-cache-restore.outputs.cache-primary-key }}

      - name: Add qodercli to PATH
        if: ${{ env.AI_REVIEW_ENGINE == 'qoder' }}
        shell: bash
        run: echo "$GITHUB_WORKSPACE/$QODERCLI_CACHE_DIR/bin" >> "$GITHUB_PATH"

      - name: Check qodercli version
        if: ${{ env.AI_REVIEW_ENGINE == 'qoder' }}
        shell: bash
        run: |
          set -euo pipefail
          actual_version="$(qodercli --version)"
          echo "qodercli version: ${actual_version}"
          test "${actual_version}" = "${QODERCLI_VERSION}"

      - name: Run AI PR review
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/workflows/scripts/ai_review_pr.py

      - name: Post PR review comment
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .tmp/ai-review/review.md ]]; then
            echo "AI review body was not produced." >&2
            exit 1
          fi
          bash scripts/upsert-pr-comment.sh \
            "<!-- dogsquard-ai-code-review -->" \
            .tmp/ai-review/review.md
